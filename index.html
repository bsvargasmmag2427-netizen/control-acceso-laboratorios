<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Acceso a Laboratorios</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#eef3f8;
    text-align:center;
}

header{
    background:#003366;
    color:white;
    padding:20px;
}

select{
    padding:12px;
    font-size:18px;
    border-radius:8px;
    margin-top:15px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:20px;
    background:#0055aa;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#003366;
}

#webcam-container{
    margin-top:25px;
}

canvas{
    border:5px solid #003366;
    border-radius:15px;
    max-width:90%;
}

#resultado{
    margin-top:25px;
    font-size:40px;
    font-weight:bold;
}

#detalle{
    margin-top:10px;
    font-size:20px;
}

</style>
</head>

<body>

<header>
<h1>SISTEMA DE CONTROL DE ACCESO</h1>
<p>Laboratorios con Inteligencia Artificial</p>
</header>

<h2>Selecciona laboratorio</h2>

<select id="laboratorio">
    <option value="mecanica">🔧 Mantenimiento / Mecatrónica</option>
    <option value="quimica">🧪 Química</option>
</select>

<br>

<button onclick="init()">Iniciar Cámara</button>

<div id="webcam-container"></div>

<div id="resultado">Esperando...</div>
<div id="detalle"></div>

<script>

const URL = "https://teachablemachine.withgoogle.com/models/9n3dRIOC6/";

let model, webcam;
let iniciado = false;

async function hablar(texto){
    let voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "es-MX";
    voz.rate = 1;
    speechSynthesis.speak(voz);
}

async function init(){

    if(iniciado) return;
    iniciado = true;

    document.getElementById("resultado").innerHTML = "Cargando modelo...";

    model = await tmImage.load(URL+"model.json", URL+"metadata.json");

    webcam = new tmImage.Webcam(400,400,true);

    await webcam.setup();
    await webcam.play();

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    loop();
}

async function loop(){
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict(){

    const prediction = await model.predict(webcam.canvas);

    let mejor = prediction[0];

    for(let i=1;i<prediction.length;i++){
        if(prediction[i].probability > mejor.probability){
            mejor = prediction[i];
        }
    }

    let lab = document.getElementById("laboratorio").value;

    let permitido = false;

    if(lab === "mecanica" && mejor.className === "bata azul"){
        permitido = true;
    }

    if(lab === "quimica" && mejor.className === "bata blanca"){
        permitido = true;
    }

    if(permitido){

        document.getElementById("resultado").innerHTML =
        "✅ ACCESO PERMITIDO";

        document.getElementById("resultado").style.color = "green";

        document.getElementById("detalle").innerHTML =
        "Puede ingresar al laboratorio";

        hablar("Acceso permitido");

    }else{

        document.getElementById("resultado").innerHTML =
        "❌ ACCESO DENEGADO";

        document.getElementById("resultado").style.color = "red";

        document.getElementById("detalle").innerHTML =
        "Verifique su equipo de protección";

        hablar("Acceso denegado");
    }
}

</script>

</body>
</html>
