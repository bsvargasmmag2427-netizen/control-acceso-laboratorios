<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Inteligente de Control de Acceso</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef3f8;
text-align:center;
}

header{
background:#003366;
color:white;
padding:20px;
}

header h1{
margin-bottom:10px;
}

main{
max-width:900px;
margin:auto;
padding:30px;
}

select{

padding:12px;
font-size:18px;
border-radius:8px;
width:320px;

}

button{

margin-top:20px;
padding:15px 30px;
font-size:20px;
background:#0055aa;
color:white;
border:none;
border-radius:10px;
cursor:pointer;

}

button:hover{

background:#003366;

}

#webcam-container{

margin-top:30px;

}

canvas{

border-radius:15px;
border:5px solid #003366;

}

#resultado{

margin-top:30px;
font-size:42px;
font-weight:bold;

}

#detalle{

margin-top:15px;
font-size:24px;

}

#confianza{

margin-top:15px;
font-size:18px;
color:#555;

}

</style>

</head>

<body>

<header>

<h1>SISTEMA DE CONTROL DE ACCESO A LABORATORIOS</h1>

<p>Reconocimiento mediante Inteligencia Artificial</p>

</header>

<main>

<h2>Seleccione un laboratorio</h2>

<br>

<select id="laboratorio">

<option value="informatica">💻 Informática</option>

<option value="quimica">🧪 Química</option>

<option value="mantenimiento">🔧 Mantenimiento Automotriz</option>

</select>

<br>

<button id="btn" onclick="init()">

Iniciar Cámara

</button>

<div id="webcam-container"></div>

<div id="resultado">

Esperando inicio...

</div>

<div id="detalle"></div>

<div id="confianza"></div>

<script>

const URL="https://teachablemachine.withgoogle.com/models/9n3dRIOC6/";

let model;
let webcam;
let iniciado=false;

async function init(){

    if(iniciado){
        return;
    }

    iniciado = true;

    document.getElementById("btn").disabled = true;

    document.getElementById("resultado").innerHTML = "🔍 Cargando modelo...";

    model = await tmImage.load(
        URL + "model.json",
        URL + "metadata.json"
    );

    webcam = new tmImage.Webcam(400,400,true);

    await webcam.setup();
    await webcam.play();

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);

}

async function loop(){

    webcam.update();

    await predict();

    window.requestAnimationFrame(loop);

}

async function predict(){

    const prediction = await model.predict(webcam.canvas);

    let mejor = prediction[0];

    for(let i=1;i<prediction.length;i++){

        if(prediction[i].probability > mejor.probability){

            mejor = prediction[i];

        }

    }

    const confianza = (mejor.probability*100).toFixed(1);

    document.getElementById("confianza").innerHTML =
    "Confianza del modelo: " + confianza + "%";

    if(mejor.probability < 0.80){

        document.getElementById("resultado").innerHTML =
        "🔍 Analizando...";

        document.getElementById("resultado").style.color = "#000";

        document.getElementById("detalle").innerHTML = "";

        return;

    }

    let laboratorio =
    document.getElementById("laboratorio").value;

    let permitido = false;

    if(laboratorio=="informatica" && mejor.className=="bata azul"){

        permitido = true;

    }

    if(laboratorio=="quimica" && mejor.className=="bata blanca"){

        permitido = true;

    }

    if(laboratorio=="mantenimiento" && mejor.className=="bata azul"){

        permitido = true;

    }

    if(permitido){

        document.getElementById("resultado").innerHTML =
        "✅ ACCESO PERMITIDO";

        document.getElementById("resultado").style.color =
        "green";

        document.getElementById("detalle").innerHTML =
        "Equipo detectado correctamente";

    }else{

        document.getElementById("resultado").innerHTML =
        "❌ ACCESO DENEGADO";

        document.getElementById("resultado").style.color =
        "red";

        document.getElementById("detalle").innerHTML =
        "El equipo no corresponde al laboratorio seleccionado";

    }

}

</script>

</main>

<footer style="
margin-top:40px;
padding:20px;
background:#003366;
color:white;
font-size:16px;
">

Sistema Inteligente de Control de Acceso a Laboratorios<br>
Proyecto Escolar - Inteligencia Artificial

</footer>

</body>
</html>
