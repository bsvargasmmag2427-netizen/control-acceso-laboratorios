<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Sistema de Acceso a Laboratorios</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#eef2f7;
    text-align:center;
    margin:0;
}

header{
    background:#003366;
    color:white;
    padding:20px;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#0055aa;
    color:white;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#003366;
}

#webcam-container{
    margin-top:25px;
}

canvas{
    border-radius:15px;
    border:5px solid #003366;
}

#resultado{
    margin-top:25px;
    font-size:32px;
    font-weight:bold;
}

#confianza{
    margin-top:10px;
    font-size:20px;
    color:#555;
}

</style>

</head>

<body>

<header>

<h1>SISTEMA DE CONTROL DE ACCESO A LABORATORIOS</h1>
<p>Reconocimiento de Equipo de Protección</p>

</header>

<button id="boton" onclick="init()">
Iniciar Cámara
</button>

<div id="webcam-container"></div>

<div id="resultado">
Presiona "Iniciar Cámara"
</div>

<div id="confianza"></div>

<script>

const URL="https://teachablemachine.withgoogle.com/models/9n3dRIOC6/";

let model;
let webcam;
let iniciado=false;

async function init(){

    if(iniciado){
        return;
    }

    iniciado=true;

    document.getElementById("boton").disabled=true;

    document.getElementById("resultado").innerHTML="🔍 Cargando modelo...";

    model=await tmImage.load(
        URL+"model.json",
        URL+"metadata.json"
    );

    webcam=new tmImage.Webcam(400,400,true);

    await webcam.setup();

    await webcam.play();

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);

}

async function loop(){

    webcam.update();

    await predict();

    window.requestAnimationFrame(loop);

}

async function predict(){

    const prediction=await model.predict(webcam.canvas);

    let mejor=prediction[0];

    for(let i=1;i<prediction.length;i++){

        if(prediction[i].probability>mejor.probability){

            mejor=prediction[i];

        }

    }

    document.getElementById("confianza").innerHTML=
    "Confianza: "+(mejor.probability*100).toFixed(1)+"%";

    if(mejor.probability<0.80){

        document.getElementById("resultado").innerHTML="🔍 Analizando...";
        document.getElementById("resultado").style.color="black";
        return;

    }

    if(mejor.className=="bata azul"){

        document.getElementById("resultado").innerHTML=
        "🟦 ACCESO PERMITIDO<br>Laboratorio de Informática";

        document.getElementById("resultado").style.color="blue";

    }

    else if(mejor.className=="bata blanca"){

        document.getElementById("resultado").innerHTML=
        "⬜ ACCESO PERMITIDO<br>Laboratorio de Química";

        document.getElementById("resultado").style.color="green";

    }

    else if(mejor.className=="incorrecto"){

        document.getElementById("resultado").innerHTML=
        "❌ ACCESO DENEGADO<br>Equipo incorrecto";

        document.getElementById("resultado").style.color="red";

    }

}

</script>

</body>
</html>
