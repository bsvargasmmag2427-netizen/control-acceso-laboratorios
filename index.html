<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Control de Acceso a Laboratorios</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#e8eef5;
    text-align:center;
}

header{
    background:#003366;
    color:white;
    padding:20px;
}

h1{
    margin:0;
}

button{
    margin-top:20px;
    padding:15px 30px;
    font-size:20px;
    background:#0055aa;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#003366;
}

#webcam-container{
    margin-top:25px;
}

canvas{
    border:5px solid #003366;
    border-radius:15px;
}

#resultado{

    margin-top:25px;

    font-size:32px;

    font-weight:bold;

}

#estado{

    margin-top:10px;

    font-size:20px;

}

</style>

</head>

<body>

<header>

<h1>CONTROL DE ACCESO A LABORATORIOS</h1>

<p>Reconocimiento de Equipo de Protección</p>

</header>

<button id="btn" onclick="init()">Iniciar Cámara</button>

<div id="webcam-container"></div>

<div id="resultado">Presiona "Iniciar Cámara"</div>

<div id="estado"></div>

<script>

const URL="https://teachablemachine.withgoogle.com/models/9n3dRIOC6/";

let model;
let webcam;
let iniciado=false;

async function init(){

    if(iniciado){

        return;

    }

    iniciado=true;

    document.getElementById("btn").disabled=true;

    document.getElementById("resultado").innerHTML="🔍 Cargando modelo...";

    model=await tmImage.load(

        URL+"model.json",

        URL+"metadata.json"

    );

    webcam=new tmImage.Webcam(400,400,true);

    await webcam.setup();

    await webcam.play();

    document.getElementById("webcam-container").appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);

}

async function loop(){

    webcam.update();

    await predict();

    window.requestAnimationFrame(loop);

}

async function predict(){

    const prediction=await model.predict(webcam.canvas);

    let mejor=prediction[0];

    for(let i=1;i<prediction.length;i++){

        if(prediction[i].probability>mejor.probability){

            mejor=prediction[i];

        }

    }

    let porcentaje=(mejor.probability*100).toFixed(1);

    document.getElementById("estado").innerHTML="Confianza: "+porcentaje+"%";

    if(mejor.probability<0.80){

        document.getElementById("resultado").innerHTML="🔍 Analizando...";

        document.getElementById("resultado").style.color="black";

        return;

    }

    if(mejor.className==="Bata azul"){

        document.getElementById("resultado").innerHTML="🟦 ACCESO PERMITIDO<br>Laboratorio de Informática";

        document.getElementById("resultado").style.color="blue";

    }

    else if(mejor.className==="Bata blanca"){

        document.getElementById("resultado").innerHTML="⬜ ACCESO PERMITIDO<br>Laboratorio de Química";

        document.getElementById("resultado").style.color="green";

    }

    else{

        document.getElementById("resultado").innerHTML="❌ ACCESO DENEGADO<br>Equipo incorrecto";

        document.getElementById("resultado").style.color="red";

    }

}

</script>

</body>

</html>
